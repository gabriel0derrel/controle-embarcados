services:
  # Serviço do Banco de Dados
  postgres:
    image: postgres:alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  # Serviço de Interface do Banco de Dados
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_network

  # Serviço de Backend (API)
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules # Impede que o node_modules local sobrescreva o do container
    depends_on:
      - postgres
    networks:
      - app_network
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

  # Serviço de Frontend
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
      - mosquitto
    networks:
      - app_network

  # Serviço de Proxy Reverso
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  # Serviço de Mosquitto Broker (MQTT)
  mosquitto:
    build: ./broker-mqtt
    container_name: mosquitto-broker
    ports:
      - "${MQTT_PORT}:1883"  # Porta padrão MQTT (Comunicação com o ESP32)
      - "${MQTT_WS_PORT}:9001"  # Porta WebSockets (Comunicação com o Frontend)
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - app_network

# Definição dos volumes nomeados para persistência
volumes:
  postgres_data:
  pgadmin_data:
  mosquitto_data:
  mosquitto_log:

# Definição da rede customizada
networks:
  app_network:
    driver: bridge
